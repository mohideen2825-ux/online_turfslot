<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TurfSlot</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/user.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="auth-page">

    <div class="auth-wrapper">
        <div class="auth-image-side">
            <div class="auth-overlay">
                <h1>Welcome to TurfSlot</h1>
                <p>Book your favorite turf anytime, anywhere.</p>
            </div>
        </div>
        <div class="auth-form-side">
            <div class="auth-box fade-in">
                <div class="logo" style="text-align: center; margin-bottom: 30px;">
                    <i class="fas fa-futbol"></i> TurfSlot
                </div>
                <h2>Welcome Back</h2>
                <p>Login to your account</p>

                <form id="login-form">
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" required placeholder="name@example.com">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" required placeholder="Enter password">
                            <i class="fas fa-eye toggle-password" data-target="password"></i>
                        </div>
                        <div style="text-align: right; margin-top: 5px;">
                            <a href="#" id="forgot-password"
                                style="font-size: 0.8rem; color: var(--primary-color);">Forgot Password?</a>
                        </div>
                    </div>
                    <button type="submit" class="cta-btn full-width">Login</button>
                    <p class="switch-auth">Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
                </form>

                <form id="signup-form" style="display: none;">
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Name</label>
                        <input type="text" id="signup-name" required placeholder="Full Name">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="signup-email" required placeholder="name@example.com">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="signup-password" required placeholder="Create password">
                            <i class="fas fa-eye toggle-password" data-target="signup-password"></i>
                        </div>
                    </div>
                    <button type="submit" class="cta-btn full-width">Sign Up</button>
                    <p class="switch-auth">Already have an account? <a href="#" id="show-login">Login</a></p>
                </form>

                <div class="auth-separator">OR</div>

                <button type="button" id="google-login-btn" class="google-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    Sign in with Google
                </button>

                <div id="auth-error" class="error-msg" style="margin-top: 15px;"></div>

                <div style="margin-top: 30px; text-align: center;">
                    <a href="index.html" style="color: var(--text-muted); font-size: 0.9rem;"><i
                            class="fas fa-arrow-left"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Simple toggle for login/signup
        document.getElementById('show-signup').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'block';
            document.querySelector('.auth-box h2').textContent = 'Create Account';
            document.querySelector('.auth-box > p').textContent = 'Join us to book your turf';
        });

        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            document.querySelector('.auth-box h2').textContent = 'Welcome Back';
            document.querySelector('.auth-box > p').textContent = 'Login to your account';
        });
    </script>
</body>

</html>
